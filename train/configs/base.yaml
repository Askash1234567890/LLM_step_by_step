model:
  vocab_size: 50257
  max_seq_len: 512
  emb_size: 256
  hidden_size: 1024
  num_heads: 8
  head_size: 32
  num_layers: 6
  dropout: 0.1

training:
  num_epochs: 10
  learning_rate: 3.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  grad_accumulation_steps: 1
  use_amp: false          # true only for  cuda
  warmup_steps: 100
  device: cpu

dataset:
  seq_len: 512
  train_batch_size: 32
  valid_batch_size: 32

logging:
  log_every_batch: 50     # every N batchs
  use_wandb: false
  project_name: llm_step_by_step

checkpointing:
  save_dir: checkpoints
  save_every_epochs: 1    # every N epochs
